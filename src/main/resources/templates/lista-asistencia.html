<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand" th:href="@{/}">
            Sistema Escolar
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/new}">Registrar</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/asistencia}">Asistencia</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/lista-asistencia}">Lista Asistencia</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/fechas}">Fechas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/report}">Reportes</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <div class="d-flex justify-content-between mb-4">

            <h2>
                Historial de Asistencias
            </h2>

            <a href="/asistencia"
               class="btn btn-success">

                Nueva Asistencia

            </a>

        </div>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

            <tr>

                <th>Estudiante</th>
                <th>Fecha</th>
                <th>Estado</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="a : ${asistencias}">

                <td th:text="${a.estudiante.name}"></td>

                <td th:text="${a.fecha}"></td>

                <td>

                    <span
                            th:text="${a.estado}"
                            th:classappend="${a.estado == 'Presente'}
                            ? 'text-success fw-bold'
                            : 'text-danger fw-bold'">
                    </span>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
