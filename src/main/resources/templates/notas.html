<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registro de Notas</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: #F5F7FA;
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: #2C3E50;
            padding: 14px 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-link-custom {
            color: #dfe6e9;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 0.92rem;
        }

        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link-custom.active {
            background: #6BBF59;
            color: white;
        }

        .card {
            border: none;
            border-radius: 14px;
        }

        .btn-save {
            background: #6BBF59;
            color: white;
            border: none;
            font-weight: 500;
        }

        .btn-save:hover {
            background: #5aa94b;
            color: white;
        }

        .table thead {
            background: #4F6D7A;
            color: white;
        }

        .title-page {
            font-weight: 600;
            color: #4F6D7A;
        }

        .select2-container {
            width: 100% !important;
        }

        /* Borde rojo en Select2 cuando hay error */
        .is-invalid+.select2-container .select2-selection {
            border-color: #dc3545 !important;
        }

        .select2-error .select2-selection {
            border-color: #dc3545 !important;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-mortarboard-fill"></i>
                Sistema Escolar
            </a>

            <div class="d-flex gap-2 flex-wrap">

                <a href="/" class="nav-link-custom">
                    <i class="bi bi-people"></i>
                    Estudiantes
                </a>

                <a href="/notas" class="nav-link-custom active">
                    <i class="bi bi-journal-check"></i>
                    Notas
                </a>

                <a href="/materias" class="nav-link-custom">
                    <i class="bi bi-book"></i>
                    Materias
                </a>

                <a href="/asistencia" class="nav-link-custom">
                    <i class="bi bi-calendar-check"></i>
                    Asistencia
                </a>

                <a href="/lista-asistencia" class="nav-link-custom">
                    <i class="bi bi-list-check"></i>
                    Lista
                </a>

            </div>

        </div>

    </nav>


    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">

                <!-- FORMULARIO -->
                <div class="card shadow">
                    <div class="card-body p-4">

                        <h3 class="text-center mb-4 title-page">Registro de Notas</h3>

                        <form id="formNotas" th:action="@{/notas/save}" th:object="${nota}" method="post" novalidate>

                            <!-- ESTUDIANTE -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Estudiante</label>
                                <select name="estudianteId" id="estudianteId" class="form-select" required>
                                    <option value="">Seleccione un estudiante</option>
                                    <option th:each="student : ${students}" th:value="${student.id}"
                                        th:text="${student.name}">
                                    </option>
                                </select>
                                <div class="invalid-feedback" id="errorEstudiante">
                                    Debe seleccionar un estudiante.
                                </div>
                            </div>

                            <!-- MATERIA -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Materia</label>
                                <select name="materiaId" id="materiaId" class="form-select" required>
                                    <option value="">Seleccione una materia</option>
                                    <option th:each="materia : ${materias}" th:value="${materia.id}"
                                        th:text="${materia.nombre}">
                                    </option>
                                </select>
                                <div class="invalid-feedback" id="errorMateria">
                                    Debe seleccionar una materia.
                                </div>
                            </div>

                            <!-- NOTAS -->
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-semibold">Nota 1</label>
                                    <input type="number" step="0.01" min="0" max="10" th:field="*{nota1}" id="nota1"
                                        class="form-control" required>
                                    <div class="invalid-feedback">
                                        Ingrese la Nota 1 (0 - 10).
                                    </div>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-semibold">Nota 2</label>
                                    <input type="number" step="0.01" min="0" max="10" th:field="*{nota2}" id="nota2"
                                        class="form-control" required>
                                    <div class="invalid-feedback">
                                        Ingrese la Nota 2 (0 - 10).
                                    </div>
                                </div>

                                <div class="col-md-4 mb-4">
                                    <label class="form-label fw-semibold">Nota 3</label>
                                    <input type="number" step="0.01" min="0" max="10" th:field="*{nota3}" id="nota3"
                                        class="form-control" required>
                                    <div class="invalid-feedback">
                                        Ingrese la Nota 3 (0 - 10).
                                    </div>
                                </div>
                            </div>

                            <!-- BOTON -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-save">Guardar Notas</button>
                            </div>

                        </form>
                    </div>
                </div>

                <!-- TABLA -->
                <div class="card shadow mt-4">
                    <div class="card-body">

                        <h5 class="mb-4">Historial de Notas</h5>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Estudiante</th>
                                        <th>Materia</th>
                                        <th>Nota 1</th>
                                        <th>Nota 2</th>
                                        <th>Nota 3</th>
                                        <th>Promedio</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="nota : ${notas}">
                                        <td th:text="${nota.estudiante.name}"></td>
                                        <td th:text="${nota.materia.nombre}"></td>
                                        <td th:text="${nota.nota1}"></td>
                                        <td th:text="${nota.nota2}"></td>
                                        <td th:text="${nota.nota3}"></td>
                                        <td th:text="${nota.promedio}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        $(document).ready(function () {

            // Inicializar Select2
            $('#estudianteId').select2({
                theme: 'bootstrap-5',
                placeholder: 'Seleccione un estudiante',
                allowClear: true,
                language: {
                    noResults: function () { return 'No se encontraron estudiantes'; }
                }
            });

            $('#materiaId').select2({
                theme: 'bootstrap-5',
                placeholder: 'Seleccione una materia',
                allowClear: true,
                language: {
                    noResults: function () { return 'No se encontraron materias'; }
                }
            });

            // Limpiar error de Select2 al seleccionar
            $('#estudianteId').on('change', function () {
                if ($(this).val()) {
                    $(this).next('.select2-container').find('.select2-selection').removeClass('select2-error');
                    $('#errorEstudiante').hide();
                }
            });

            $('#materiaId').on('change', function () {
                if ($(this).val()) {
                    $(this).next('.select2-container').find('.select2-selection').removeClass('select2-error');
                    $('#errorMateria').hide();
                }
            });

            // Validacion al enviar el formulario
            $('#formNotas').on('submit', function (e) {
                let valido = true;

                // Validar estudiante
                if (!$('#estudianteId').val()) {
                    $('#estudianteId').next('.select2-container').find('.select2-selection').addClass('select2-error');
                    $('#errorEstudiante').show();
                    valido = false;
                } else {
                    $('#estudianteId').next('.select2-container').find('.select2-selection').removeClass('select2-error');
                    $('#errorEstudiante').hide();
                }

                // Validar materia
                if (!$('#materiaId').val()) {
                    $('#materiaId').next('.select2-container').find('.select2-selection').addClass('select2-error');
                    $('#errorMateria').show();
                    valido = false;
                } else {
                    $('#materiaId').next('.select2-container').find('.select2-selection').removeClass('select2-error');
                    $('#errorMateria').hide();
                }

                // Validar notas (min 0, max 10, no vacías)
                ['nota1', 'nota2', 'nota3'].forEach(function (campo) {
                    const input = $('#' + campo);
                    const valor = input.val();

                    if (valor === '' || valor === null) {
                        input.addClass('is-invalid');
                        valido = false;
                    } else if (parseFloat(valor) < 0 || parseFloat(valor) > 10) {
                        input.addClass('is-invalid');
                        valido = false;
                    } else {
                        input.removeClass('is-invalid').addClass('is-valid');
                    }
                });

                if (!valido) {
                    e.preventDefault(); // Bloquea el envio si hay errores
                }
            });

            // Limpiar validacion de notas al escribir
            $('#nota1, #nota2, #nota3').on('input', function () {
                const valor = parseFloat($(this).val());
                if (!isNaN(valor) && valor >= 0 && valor <= 10) {
                    $(this).removeClass('is-invalid').addClass('is-valid');
                } else {
                    $(this).addClass('is-invalid').removeClass('is-valid');
                }
            });

        });
    </script>

</body>

</html>
