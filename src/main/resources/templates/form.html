<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>

        body{
            background:#F5F7FA;
            font-family:'Poppins', sans-serif;
        }

        .navbar{
            background:#4F6D7A;
        }

        .card{
            border:none;
            border-radius:12px;
        }

        .btn-save{
            background:#6BBF59;
            color:white;
            border:none;
        }

        .btn-save:hover{
            background:#5aa94b;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand" th:href="@{/}">
            Sistema Escolar
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/new}">Registrar</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/asistencia}">Asistencia</a>
                </li>

                <a href="/fechas"
                   class="nav-link-custom"
                   sec:authorize="hasRole('ADMIN')">

                    <i class="bi bi-list-check"></i>
                    Fechas

                </a>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/fechas}">Fechas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/report}">Reportes</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h4 class="mb-4 text-center">
                        Registrar Estudiante
                    </h4>

                    <form th:action="@{/save}" th:object="${student}" method="post">

                        <div class="mb-3">

                            <label class="form-label">Nombre</label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">Edad</label>

                            <input type="number"
                                   th:field="*{age}"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">Grado</label>

                            <input type="text"
                                   th:field="*{grade}"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="mb-4">

                            <label class="form-label">Sección</label>

                            <select th:field="*{section}" class="form-select">

                                <option value="A">A</option>
                                <option value="B">B</option>

                            </select>

                        </div>


                        <div class="d-grid">

                            <button type="submit" class="btn btn-save">
                                Guardar Estudiante
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
