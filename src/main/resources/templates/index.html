<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>


    <title>Inicio | Sistema Escolar</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>

        body{
            background:#F5F7FA;
            font-family:'Poppins', sans-serif;
        }

        .navbar{
            background:#4F6D7A;
        }

        .navbar-brand{
            font-weight:600;
            font-size:22px;
        }

        .nav-link{
            color:white !important;
            margin-left:10px;
            border-radius:8px;
            padding:8px 14px !important;
            transition:0.3s;
        }

        .nav-link:hover{
            background:rgba(255,255,255,0.15);
        }

        .title-page{
            color:#4F6D7A;
            font-weight:600;
        }

        .card{
            border:none;
            border-radius:14px;
        }

        .stat-card{
            color:white;
        }

        .bg-blue{
            background:#4F6D7A;
        }

        .bg-green{
            background:#6BBF59;
        }

        .bg-orange{
            background:#F4A261;
        }

        .table thead{
            background:#4F6D7A;
            color:white;
        }

        .table tbody tr:hover{
            background:#f1f3f5;
        }

        .btn-main{
            background:#6BBF59;
            color:white;
            border:none;
        }

        .btn-main:hover{
            background:#5aa94b;
            color:white;
        }

        .btn-delete{
            background:#E57373;
            color:white;
            border:none;
        }

        .btn-delete:hover{
            background:#d95f5f;
            color:white;
        }

    </style>


</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand" th:href="@{/}">
            Sistema Escolar
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/new}">Registrar</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/asistencia}">Asistencia</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/lista-asistencia}">Lista Asistencia</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/fechas}">Fechas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/report}">Reportes</a>
                </li>

            </ul>

        </div>

    </div>

</nav>


<div class="container mt-5">


    <div class="row mb-4">

        <div class="col-md-4 mb-3">

            <div class="card stat-card bg-blue shadow">
                <div class="card-body text-center">
                    <h5>Total Estudiantes</h5>
                    <h2 th:text="${#lists.size(students)}">0</h2>
                </div>
            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card stat-card bg-green shadow">
                <div class="card-body text-center">
                    <h5>Sección A/B</h5>
                    <h2>2</h2>
                </div>
            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card stat-card bg-orange shadow">
                <div class="card-body text-center">
                    <h5>Sistema Activo</h5>
                    <h2>100%</h2>
                </div>
            </div>

        </div>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <h5 class="mb-3">Listado General</h5>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                    <tr>
                        <th>Nombre</th>
                        <th>Edad</th>
                        <th>Grado</th>
                        <th>Sección</th>
                        <th class="text-center">Acción</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="student : ${students}">

                        <td th:text="${student.name}"></td>

                        <td th:text="${student.age}"></td>

                        <td th:text="${student.grade}"></td>

                        <td th:text="${student.section}"></td>

                        <td class="text-center">

                            <a th:href="@{/delete/{id}(id=${student.id})}"
                               class="btn btn-sm btn-delete">
                                Eliminar
                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<a href="/asistencia"
   class="btn btn-success">

    Registro de Asistencia

</a>

<a href="/lista-asistencia"
   class="btn btn-dark">

    Ver Asistencias

</a>

</body>
</html>
