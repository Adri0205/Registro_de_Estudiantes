<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Inicio | Sistema Escolar</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: #F5F7FA;
            font-family: 'Poppins', sans-serif;
        }

        .navbar {
            background: #2C3E50;
            padding: 14px 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-link-custom {
            color: #dfe6e9;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 0.92rem;
        }

        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link-custom.active {
            background: #6BBF59;
            color: white;
        }

        .card {
            border: none;
            border-radius: 16px;
        }

        .card-body {
            padding: 2rem;
        }

        .page-title {
            font-weight: 600;
            color: #2C3E50;
        }

        .page-subtitle {
            color: #7f8c8d;
            font-size: 0.92rem;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #dcdde1;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #6BBF59;
            box-shadow: 0 0 0 0.2rem rgba(107, 191, 89, 0.2);
        }

        .btn-save {
            background: #6BBF59;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-save:hover {
            background: #5aa94b;
            color: white;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-mortarboard-fill"></i>
                Sistema Escolar
            </a>

            <div class="d-flex gap-2 flex-wrap">

                <a href="/" class="nav-link-custom active">
                    <i class="bi bi-people"></i>
                    Estudiantes
                </a>

                <a href="/notas" class="nav-link-custom">
                    <i class="bi bi-journal-check"></i>
                    Notas
                </a>

                <a href="/materias" class="nav-link-custom">
                    <i class="bi bi-book"></i>
                    Materias
                </a>

                <a href="/asistencia" class="nav-link-custom">
                    <i class="bi bi-calendar-check"></i>
                    Asistencia
                </a>

                <a href="/lista-asistencia" class="nav-link-custom">
                    <i class="bi bi-list-check"></i>
                    Lista
                </a>

            </div>

        </div>

    </nav>

    <!-- CONTENIDO -->
    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-7">

                <div class="mb-4">

                    <h2 class="page-title">
                        Registrar Estudiante
                    </h2>

                    <p class="page-subtitle">
                        Administra los estudiantes del sistema escolar
                    </p>

                </div>

                <div class="card shadow-sm">

                    <div class="card-body">

                        <form th:action="@{/save}" th:object="${student}" method="post">

                            <div class="mb-3">

                                <label class="form-label">
                                    Nombre
                                </label>

                                <input type="text" th:field="*{name}" class="form-control" placeholder="Ej: Juan Pérez"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Edad
                                </label>

                                <input type="number" th:field="*{age}" class="form-control" placeholder="15" required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Grado
                                </label>

                                <input type="text" th:field="*{grade}" class="form-control"
                                    placeholder="1° Bachillerato" required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Sección
                                </label>

                                <select th:field="*{section}" class="form-select">

                                    <option value="A">A</option>
                                    <option value="B">B</option>

                                </select>

                            </div>

                            <div class="d-grid">

                                <button type="submit" class="btn btn-save">

                                    <i class="bi bi-save me-2"></i>
                                    Guardar Estudiante

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

        <!-- TABLA -->
        <div class="card shadow-sm mt-4">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <div>

                        <h4 class="page-title mb-0">
                            Lista de Estudiantes
                        </h4>

                        <p class="page-subtitle mb-0">
                            Estudiantes registrados en el sistema
                        </p>

                    </div>

                    <span class="badge bg-success fs-6" th:text="${students.size()} + ' estudiantes'">
                    </span>

                </div>

                <div class="table-responsive">

                    <table class="table align-middle table-hover">

                        <thead>

                            <tr>

                                <th>#</th>
                                <th>Nombre</th>
                                <th>Edad</th>
                                <th>Grado</th>
                                <th>Sección</th>
                                <th>Acciones</th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="s, iter : ${students}">

                                <td th:text="${iter.index + 1}"></td>

                                <td th:text="${s.name}"></td>

                                <td th:text="${s.age}"></td>

                                <td th:text="${s.grade}"></td>

                                <td th:text="${s.section}"></td>

                                <td>

                                    <a th:href="@{/delete/{id}(id=${s.id})}" class="btn btn-sm btn-danger"
                                        onclick="return confirm('¿Eliminar estudiante?')">

                                        <i class="bi bi-trash"></i>

                                    </a>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
