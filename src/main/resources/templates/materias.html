<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Registro de Materias</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: #F5F7FA;
            font-family: 'Poppins', sans-serif;
        }

         /* NAVBAR */
        .navbar {
            background: #2C3E50;
            padding: 14px 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-link-custom {
            color: #dfe6e9;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 0.92rem;
        }

        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link-custom.active {
            background: #6BBF59;
            color: white;
        }

        .card {
            border: none;
            border-radius: 14px;
        }

        .btn-save {
            background: #6BBF59;
            color: white;
            border: none;
            font-weight: 500;
        }

        .btn-save:hover {
            background: #5aa94b;
            color: white;
        }

        .table thead {
            background: #4F6D7A;
            color: white;
        }

        .title-page {
            font-weight: 600;
            color: #4F6D7A;
        }
    </style>

</head>

<body>

   <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-mortarboard-fill"></i>
                Sistema Escolar
            </a>

            <div class="d-flex gap-2 flex-wrap">

                <a href="/" class="nav-link-custom">
                    <i class="bi bi-people"></i>
                    Estudiantes
                </a>

                <a href="/notas" class="nav-link-custom">
                    <i class="bi bi-journal-check"></i>
                    Notas
                </a>

                <a href="/materias" class="nav-link-custom active">
                    <i class="bi bi-book"></i>
                    Materias
                </a>

                <a href="/asistencia" class="nav-link-custom">
                    <i class="bi bi-calendar-check"></i>
                    Asistencia
                </a>

                <a href="/lista-asistencia" class="nav-link-custom">
                    <i class="bi bi-list-check"></i>
                    Lista
                </a>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow">

                    <div class="card-body p-4">

                        <h3 class="text-center mb-4 title-page">
                            Registro de Materias
                        </h3>

                        <!-- FORMULARIO -->
                        <form th:action="@{/materias/save}" th:object="${materia}" method="post">

                            <div class="mb-4">

                                <label class="form-label">
                                    Nombre de la Materia
                                </label>

                                <input type="text" th:field="*{nombre}" class="form-control"
                                    placeholder="Ejemplo: Matemática" required>

                            </div>

                            <div class="d-grid">

                                <button type="submit" class="btn btn-save">

                                    Guardar Materia

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

                <!-- TABLA -->
                <div class="card shadow mt-4">

                    <div class="card-body">

                        <h5 class="mb-4">
                            Lista de Materias
                        </h5>

                        <div class="table-responsive">

                            <table class="table table-hover align-middle">

                                <thead>

                                    <tr>

                                        <th>ID</th>
                                        <th>Materia</th>

                                    </tr>

                                </thead>

                                <tbody>

                                    <tr th:each="materia : ${materias}">

                                        <td th:text="${materia.id}"></td>

                                        <td th:text="${materia.nombre}"></td>

                                    </tr>

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
