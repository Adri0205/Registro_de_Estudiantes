<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Registro de Asistencia</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            background: #F5F7FA;
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: #2C3E50;
            padding: 14px 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-link-custom {
            color: #dfe6e9;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 0.92rem;
        }

        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link-custom.active {
            background: #6BBF59;
            color: white;
        }

        .card {
            border: none;
            border-radius: 16px;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
        }

        .btn-primary {
            background: #6BBF59;
            border: none;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background: #5aa94b;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-mortarboard-fill"></i>
                Sistema Escolar
            </a>

            <div class="d-flex gap-2 flex-wrap">

                <a href="/" class="nav-link-custom">
                    <i class="bi bi-people"></i>
                    Estudiantes
                </a>

                <a href="/notas" class="nav-link-custom">
                    <i class="bi bi-journal-check"></i>
                    Notas
                </a>

                <a href="/materias" class="nav-link-custom">
                    <i class="bi bi-book"></i>
                    Materias
                </a>

                <a href="/asistencia" class="nav-link-custom active">
                    <i class="bi bi-calendar-check"></i>
                    Asistencia
                </a>

                <a href="/lista-asistencia" class="nav-link-custom">
                    <i class="bi bi-list-check"></i>
                    Lista
                </a>

            </div>

        </div>

    </nav>

    <!-- CONTENIDO -->
    <div class="container mt-5">

        <div class="card shadow-sm p-4">

            <h2 class="mb-4 text-center">
                Registro de Asistencia
            </h2>

            <form th:action="@{/guardarAsistencia}" method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Estudiante
                    </label>

                    <select name="estudianteId" class="form-select" required>

                        <option value="">
                            Seleccione un estudiante
                        </option>

                        <option th:each="student : ${students}"
                            th:value="${student.id}"
                            th:text="${student.name}">
                        </option>

                    </select>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Estado
                    </label>

                    <select name="estado" class="form-select">

                        <option value="Presente">
                            Presente
                        </option>

                        <option value="Ausente">
                            Ausente
                        </option>

                    </select>

                </div>

                <div class="d-grid">

                    <button type="submit" class="btn btn-primary">

                        Guardar Asistencia

                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
