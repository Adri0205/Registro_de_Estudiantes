<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Registro de Asistencia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4 text-center">
            Registro de Asistencia
        </h2>

        <form action="/guardarAsistencia" method="post">

            <div class="mb-3">

                <label class="form-label">
                    Estudiante
                </label>

                <select name="estudianteId"
                        class="form-select">

                    <option
                            th:each="student : ${students}"
                            th:value="${student.id}"
                            th:text="${student.name}">
                    </option>

                </select>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Estado
                </label>

                <select name="estado"
                        class="form-select">

                    <option value="Presente">
                        Presente
                    </option>

                    <option value="Ausente">
                        Ausente
                    </option>

                </select>

            </div>

            <div class="d-grid">

                <button type="submit"
                        class="btn btn-primary">

                    Guardar Asistencia

                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
